<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Despesa por Empenho - Portal da Transparência MG</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* ============================================================
           1. VARIÁVEIS DE CORES
        ============================================================ */
        :root {
            --primary-dark:      #1a3a5c;
            --primary-darker:    #0f2a44;
            --accent-red:        #b93c42;
            --accent-bright:     #db233f;
            --background-light:  #f5f7fa;
            --success-green:     #28a745;
            --warning-yellow:    #ffc107;
            --info-blue:         #17a2b8;
            --border-color:      #dee2e6;
        }

        /* ============================================================
           2. RESET E CONFIGURAÇÕES GLOBAIS
        ============================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; overflow-x: hidden; margin: 0; padding: 0; height: auto; min-height: auto; }
        body {
            font-family: 'Montserrat', Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-light);
            padding-bottom: 15px;
            overflow-x: hidden;
            min-height: auto;
            height: auto;
            position: relative;
        }
        body, button, input, select, textarea, span, div { font-family: 'Montserrat', sans-serif !important; }
        .material-icons { font-family: 'Material Icons' !important; font-size: 14px; vertical-align: middle; }

        /* ============================================================
           3. LAYOUT PRINCIPAL
        ============================================================ */
        .main-container { height: auto; min-height: auto; overflow: visible; position: relative; }
        .container-fluid { width: 100%; max-width: 88% !important; padding: 0 40px; margin: 0; height: auto; min-height: auto; }
        .dashboard-container { width: 100%; max-width: 100%; padding: 0 40px; margin: 0 auto; height: auto; min-height: auto; }
        .tab-content, .tab-pane { width: 100%; height: auto; min-height: auto; overflow: visible; }
        .table-container { height: auto; min-height: auto; overflow: visible; position: relative; }
        .iframe-mode { overflow: visible !important; }

        /* ============================================================
           4. DATA DE ATUALIZAÇÃO
        ============================================================ */
        .data-atualizacao-container { display: flex; justify-content: left; align-items: center; margin: 15px 0; }
        .data-atualizacao-box {
            background: transparent !important;
            border-radius: 8px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--primary-dark);
            font-weight: 600;
            box-shadow: none;
        }
        .data-atualizacao-box i { font-size: 14px; color: var(--accent-red); }

        /* ============================================================
           5. FILTROS
        ============================================================ */
        .filter-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
        }
        .filter-label { font-size: 13px; font-weight: 600; color: #1a3a5c; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .filter-label i { font-size: 14px; color: var(--accent-red); }
        .form-control, .form-select {
            border: 2px solid #e9ecef;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            transition: all 0.3s ease;
            height: auto;
            width: 100%;
        }
        .form-control:focus, .form-select:focus { border-color: var(--accent-red); box-shadow: 0 0 0 2px rgba(185,60,66,0.15); outline: none; }
        .modern-select {
            border: 1.5px solid #dfe5ec !important;
            border-radius: 8px !important;
            padding: 10px 12px !important;
            font-size: 13px !important;
            height: 42px !important;
            line-height: 1.5 !important;
            background-color: #fff;
            transition: all 0.2s ease;
            width: 100%;
        }
        .modern-select:focus { border-color: #1a3a5c !important; box-shadow: 0 0 0 2px rgba(26,58,92,0.1); outline: none; }
        .filters-row { display: flex; gap: 15px; width: 100%; flex-wrap: wrap; margin-bottom: 12px; }
        .filter-group { flex: 1; min-width: 140px; }
        .botoes-abaixo { margin-top: 8px; display: flex; gap: 10px; flex-wrap: wrap; }

        /* ============================================================
           6. CARDS DE MÉTRICAS
        ============================================================ */
        .metric-card {
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e9ef;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
            overflow: hidden;
            height: 100%;
            transition: box-shadow 0.25s ease, transform 0.25s ease;
        }
        .metric-card:hover { box-shadow: 0 8px 24px rgba(26,58,92,0.13); transform: translateY(-2px); }
        .metric-header {
            background: #20445d;
            color: white;
            font-size: 13px;
            font-weight: 600;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .metric-body { padding: 12px 15px; }
        .metric-value { font-size: 18px; font-weight: 700; color: #171c21; }
        .metric-sublabel { font-size: 10px; color: #94a3b8; font-weight: 500; margin-top: 2px; }

        /* ============================================================
           7. GRÁFICOS
        ============================================================ */
        .chart-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .chart-header {
            background: #20445d;
            color: white;
            padding: 12px 16px;
            margin: 0;
        }
        .chart-title { font-size: 14px; font-weight: 600; color: white; margin: 0; }
        .chart-wrapper { height: 260px; padding: 10px 15px; width: 100%; }

        /* ============================================================
           8. TABELAS
        ============================================================ */
        .table-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .table-title { font-size: 13px; font-weight: 600; margin: 0; }
        .table-badge { background: #1a3a5c; color: white; padding: 5px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
        .table-fixed-header-container { position: relative; overflow: auto; width: 100%; max-height: 600px; }
        .table-fixed-header-container table thead th {
            background-color: #54697b !important;
            color: white !important;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 600;
            padding: 12px 10px;
            font-size: 12px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .table { width: 100%; font-size: 12px; border-collapse: collapse; table-layout: auto; }
        .table th, .table td { border: 1px solid #d6dee6; }
        .table thead th {
            background-color: #54697b !important;
            color: white !important;
            font-weight: 600;
            font-size: 12px;
            padding: 12px 10px;
            text-transform: uppercase;
            border: 1px solid #d6dee6;
            cursor: pointer;
            user-select: none;
        }
        .table thead th:hover { background-color: #3d5566 !important; }
        .table tbody tr { background-color: #ffffff; }
        .table tbody td { padding: 10px 10px; vertical-align: middle; border-bottom: 1px solid #f1f1f1; font-size: 12px; }
        .table tbody tr:hover { background-color: rgba(41,67,90,0.04); }
        .table tfoot { position: sticky; bottom: 0; z-index: 20; }
        .table tfoot tr, .table tfoot td { background-color: #dfe3e8 !important; font-weight: 700; font-size: 12px; }
        .table-responsive { display: block; width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }

        .orgao-link, .empenho-link {
            color: #006a82;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .orgao-link:hover, .empenho-link:hover { color: var(--accent-red); text-decoration: underline; }

        .sortable-header { cursor: pointer; position: relative; padding-right: 22px !important; }
        .sortable-header:hover { background-color: #3d5566 !important; }
        .sortable-header i { font-size: 13px; position: absolute; right: 5px; top: 50%; transform: translateY(-50%); opacity: 0.8; }
        .text-right { text-align: right; }

        /* ============================================================
           9. BOTÕES
        ============================================================ */
        .btn-pesquisa {
            background: linear-gradient(to right, #20445d, #20445d);
            border: none;
            padding: 0 16px;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 13px;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            height: 36px;
            white-space: nowrap;
        }
        .btn-pesquisa:hover { background: linear-gradient(to right, var(--accent-red), #a32c32); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(185,60,66,0.2); color: white; }
        .btn-secondary-custom {
            background: white;
            border: 2px solid var(--primary-darker);
            color: var(--primary-darker);
            padding: 0 16px;
            font-weight: 600;
            font-size: 13px;
            border-radius: 6px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            height: 36px;
            white-space: nowrap;
            text-decoration: none !important;
        }
        .btn-secondary-custom:hover { background-color: #132837 !important; color: white !important; border-color: #132837 !important; }
        .btn-export {
            appearance: none;
            -webkit-appearance: none;
            background: transparent !important;
            border: 1px solid #d6dee6;
            color: #1a3a5c;
            padding: 0 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            height: 32px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .btn-export i { font-size: 14px !important; }
        button.btn-export:hover, a.btn-export:hover { background-color: #1a3a5c !important; border-color: #1a3a5c !important; color: #ffffff !important; }
        .btn-action {
            padding: 4px;
            border-radius: 7px;
            border: 1.5px solid #1a3a5c;
            background-color: #ffffff;
            color: #1a3a5c;
            width: 32px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-action:hover { background-color: #1a3a5c; color: #ffffff; }
        .btn-topo {
            background: #eeeff5;
            color: #1a3a5c;
            border: 1px solid #d6dee6;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            height: 32px;
        }
        .btn-topo:hover { background-color: #1a3a5c; color: #ffffff; border-color: #1a3a5c; }

        /* Seletor de colunas */
        .column-selector { position: relative; display: inline-block; }
        .column-selector-dropdown { display: none; position: absolute; right: 0; top: 100%; background: white; min-width: 260px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); border-radius: 8px; z-index: 2000; margin-top: 5px; padding: 15px; border: 1px solid #e9ecef; max-height: 320px; overflow-y: auto; }
        .column-selector-dropdown.show { display: block; }
        .column-selector-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #e9ecef; }
        .column-selector-header h6 { font-size: 13px; font-weight: 700; color: var(--primary-dark); margin: 0; }
        .column-selector-close { cursor: pointer; color: #6c757d; font-size: 14px; }
        .column-selector-close:hover { color: var(--accent-red); }
        .column-selector-item { display: flex; align-items: center; padding: 6px 8px; border-radius: 4px; cursor: pointer; }
        .column-selector-item:hover { background-color: #f8f9fa; }
        .column-selector-item input[type="checkbox"] { width: 14px; height: 14px; margin-right: 8px; cursor: pointer; accent-color: var(--primary-dark); }
        .column-selector-item label { font-size: 12px; cursor: pointer; flex: 1; color: var(--primary-dark); }
        .fixed-column-badge { font-size: 10px; background-color: #e9ecef; color: #6c757d; padding: 2px 6px; border-radius: 12px; font-weight: 600; margin-right: 8px; }

        /* ============================================================
           10. NAVEGAÇÃO (abas)
        ============================================================ */
        .nav-tabs-container { background: transparent; padding: 10px 0; margin-top: 15px; margin-bottom: 15px; width: 100%; }
        .nav-tabs { border: none !important; gap: 10px; width: 100%; flex-wrap: wrap; }
        .nav-tabs .nav-link {
            border: none !important;
            background: #ffffff !important;
            border-radius: 10px !important;
            padding: 8px 18px !important;
            font-weight: 500;
            font-size: 13px;
            color: #1a3a5c !important;
            display: inline-flex !important;
            align-items: center;
            gap: 6px;
            transition: all .25s ease;
            white-space: nowrap;
        }
        .nav-tabs .nav-link:hover { background: #e6e9ed !important; }
        .nav-tabs .nav-link.active { background: #234c63 !important; color: #fff !important; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .nav-tabs .material-icons { font-size: 14px !important; }

        /* ============================================================
           11. MODAL
        ============================================================ */
        .modal-creative .modal-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%);
            color: white !important;
            padding: 15px 20px;
            border-bottom: none;
        }
        .modal-creative .modal-header .modal-title { color: white !important; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .modal-creative .modal-header .btn-close { filter: brightness(0) invert(1); opacity: 1; }
        .info-card { background: #f8fafd; border-radius: 10px; padding: 13px 16px; margin-bottom: 13px; border: 1px solid #e2e8f0; border-left: 4px solid var(--accent-red); }
        .info-card.primary { border-left-color: var(--primary-dark); }
        .info-label { font-size: 10px; text-transform: uppercase; color: #64748b; font-weight: 600; margin-bottom: 4px; }
        .info-value { font-size: 13px; font-weight: 500; color: #1e293b; word-break: break-word; }
        .info-value.highlight { font-size: 16px; color: var(--accent-red); font-weight: 700; }

        /* ============================================================
           12. PAGINAÇÃO
        ============================================================ */
        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: white;
            border-top: 1px solid #dee2e6;
            width: 100%;
            flex-wrap: wrap;
            gap: 10px;
            border-radius: 0 0 8px 8px;
        }
        .pagination-info { display: flex; align-items: center; gap: 12px; font-size: 12px; color: #6c757d; flex-wrap: wrap; }
        .pagination-controls { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .pagination-controls button {
            min-width: 34px; height: 34px; border: 1px solid #dee2e6; background: white; color: var(--primary-dark);
            border-radius: 6px; display: inline-flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; font-size: 13px; padding: 0 6px;
        }
        .pagination-controls button:hover:not(:disabled) { background-color: var(--primary-dark); color: white; border-color: var(--primary-dark); }
        .pagination-controls button.active { background-color: var(--primary-dark); color: white; border-color: var(--primary-dark); }
        .pagination-controls button:disabled { opacity: 0.5; cursor: not-allowed; }
        .page-size-selector { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6c757d; }
        .page-size-selector select { width: 70px; border: 1px solid #d6dee6; border-radius: 6px; padding: 4px 6px; font-size: 12px; background-color: white; color: var(--primary-dark); font-weight: 600; cursor: pointer; outline: none; }
        .page-input { display: flex; align-items: center; gap: 6px; }
        .page-input input { width: 56px; height: 32px; border: 1px solid #dee2e6; border-radius: 6px; text-align: center; font-size: 13px; padding: 0 4px; }
        .page-input input:focus { outline: none; border-color: var(--primary-dark); }
        .page-input button { height: 32px; background: var(--primary-dark); color: white; border: none; border-radius: 6px; padding: 0 10px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .page-input button:hover { background: var(--accent-red); }

        /* ============================================================
           13. TOOLBAR
        ============================================================ */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .toolbar-left  { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

        /* ============================================================
           14. LOADING
        ============================================================ */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(238,241,246,0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 14px;
        }
        .loading-overlay.show { display: flex; }
        .loading-progress { font-size: 13px; color: #20445d; font-weight: 700; }
        .spinner-small { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ============================================================
           15. TOAST
        ============================================================ */
        .toast-sucesso {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: #e6f4ea; color: #1e4620;
            border-radius: 12px; padding: 14px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: none; align-items: center; justify-content: center; gap: 10px;
            z-index: 9999; min-width: 280px;
        }

        /* ============================================================
           16. METADADOS
        ============================================================ */
        .metadata-container { background: white; border-radius: 10px; box-shadow: 0 3px 12px rgba(0,0,0,0.06); overflow: hidden; margin-bottom: 20px; }
        .metadata-header { background: #20445d; color: white; padding: 12px 16px; font-size: 13px; font-weight: 700; }
        .metadata-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .metadata-table thead th { background-color: #54697b !important; color: white !important; padding: 10px; font-size: 11px; text-transform: uppercase; font-weight: 600; }
        .metadata-table tbody tr:nth-child(even) { background: #f8fafd; }
        .metadata-table tbody td { padding: 10px; border-bottom: 1px solid #f0f4f8; vertical-align: top; color: #334155; }
        .metadata-table code { background: #e2e8f0; color: #0f172a; padding: 2px 6px; border-radius: 4px; font-size: 11px; }

        /* ============================================================
           17. RESPONSIVIDADE
        ============================================================ */
        @media (max-width: 992px) {
            .container-fluid, .dashboard-container { padding: 0 15px !important; }
        }
        @media (max-width: 768px) {
            .container-fluid, .dashboard-container { padding: 0 10px !important; }
            .nav-tabs { flex-direction: column; gap: 6px; }
            .nav-tabs .nav-link { width: 100%; justify-content: flex-start; font-size: 13px; padding: 10px 14px !important; border-radius: 8px !important; }
            .filters-row { flex-direction: column; }
            .filter-group { min-width: 100%; width: 100%; }
            .botoes-abaixo { flex-direction: column; }
            .btn-pesquisa, .btn-secondary-custom { width: 100%; justify-content: center; }
            .metric-value { font-size: 14px; }
            .toolbar { flex-direction: column; align-items: flex-start; }
            .pagination-container { flex-direction: column; align-items: flex-start; gap: 8px; }
            .page-input { display: none; }
            .table-fixed-header-container { max-height: 400px; }
            .table { font-size: 11px; }
            .modal-dialog { max-width: 98% !important; width: 98% !important; margin: 4px auto; }
            .chart-wrapper { height: 200px; }
        }
    </style>
</head>
<body class="iframe-mode">

<div class="main-container">
    <div class="container-fluid dashboard-container">

        <!-- Navegação por abas -->
        <div class="nav-tabs-container">
            <ul class="nav nav-tabs" id="dashboardTabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" id="visao-geral-tab"
                        data-bs-toggle="tab" data-bs-target="#visao-geral">
                        <i class="material-icons">bar_chart</i>Visão Geral
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="consulta-empenho-tab"
                        data-bs-toggle="tab" data-bs-target="#consulta-empenho">
                        <i class="material-icons">receipt</i>Consulta por Empenho
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="downloads-tab"
                        data-bs-toggle="tab" data-bs-target="#downloads">
                        <i class="material-icons">download</i>Downloads
                    </button>
                </li>
            </ul>
        </div>

        <!-- Data de atualização -->
        <div class="data-atualizacao-container">
            <div class="data-atualizacao-box">
                <i class="material-icons">event</i>
                Atualizado em: <span id="data-atualizacao-header" style="margin-left:4px;">Carregando...</span>
            </div>
        </div>

        <!-- Conteúdo das abas -->
        <div class="tab-content" id="dashboardTabsContent">
            <div class="tab-pane fade show active" id="visao-geral" role="tabpanel">
                <div id="visao-geral-content"></div>

function mostrarLoading(show, msg) {

function formatarMoeda(valor) {
    if (!valor && valor !== 0) return 'R$ 0,00';
    const num = typeof valor === 'number' ? valor : parseFloat(String(valor).replace(/\./g,'').replace(',','.'));
    if (isNaN(num)) return 'R$ 0,00';
    return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 2 });
}

function formatarData(dataStr) {
    if (!dataStr || dataStr === 'NULL' || dataStr === '') return '-';
    if (dataStr.includes('/')) return dataStr;
    const partes = dataStr.split('-');
    if (partes.length === 3) return `${partes[2]}/${partes[1]}/${partes[0]}`;
    return dataStr;
}

// Converte valor numérico para inteiro sem .0
function formatarInteiro(valor) {
    if (!valor && valor !== 0) return '';
    let str = String(valor).trim();
    // Remove .0 ou ,0 do final
    const num = parseFloat(str.replace(',', '.'));
    if (isNaN(num)) return str;
    return Math.trunc(num).toString();
}

function parseCSV(texto) {
    const linhas = texto.trim().split('\n');
    if (linhas.length < 2) return [];

    // Auto-detectar separador: contar ; e , fora de aspas na primeira linha
    const primeiraLinha = linhas[0].replace(/^\uFEFF/, '');
    let contSemicolon = 0, contComma = 0, emAspasD = false;
    for (const ch of primeiraLinha) {
        if (ch === '"') { emAspasD = !emAspasD; continue; }
        if (emAspasD) continue;
        if (ch === ';') contSemicolon++;
        else if (ch === ',') contComma++;
    }
    const sep = contSemicolon >= contComma ? ';' : ',';

    function splitLinha(linha) {
        const vals = [];
        let campo = '', aspas = false;
        for (let j = 0; j < linha.length; j++) {
            const c = linha[j];
            if (c === '"') { aspas = !aspas; }
            else if (c === sep && !aspas) { vals.push(campo); campo = ''; }
            else { campo += c; }
        }
        vals.push(campo);
        return vals;
    }

    const cabecalhos = splitLinha(primeiraLinha).map(h => h.trim().replace(/"/g, ''));
    const dados = [];
    for (let i = 1; i < linhas.length; i++) {
        if (!linhas[i].trim()) continue;
        const valores = splitLinha(linhas[i]);
        const obj = {};
        cabecalhos.forEach((cab, idx) => {
            let v = valores[idx] !== undefined ? valores[idx].trim().replace(/^"|"$/g, '') : '';
            if (v === 'NULL' || v === '') v = null;
            obj[cab] = v;
        });
        dados.push(obj);
    }
    return dados;
}

function parsearValorMonetario(v) {
    if (!v && v !== 0) return 0;
    let str = String(v).trim();
    if (!str || str === 'NULL' || str === '' || str === '-') return 0;
    // Detect format: if has comma and dot, determine which is decimal separator
    // BR format: 1.234,56 → dot=thousands, comma=decimal
    // US format: 1,234.56 → comma=thousands, dot=decimal
    const hasDot = str.includes('.');
    const hasComma = str.includes(',');
    if (hasDot && hasComma) {
        // Last separator is decimal
        const lastDot = str.lastIndexOf('.');
        const lastComma = str.lastIndexOf(',');
        if (lastComma > lastDot) {
            // BR format: remove dots, replace comma with dot
            str = str.replace(/\./g, '').replace(',', '.');
        } else {
            // US format: remove commas
            str = str.replace(/,/g, '');
        }
    } else if (hasComma) {
        // Only comma — could be decimal (BR: 1234,56) or thousands (1,234)
        // If digits after comma are exactly 3 and no other comma, treat as thousands
        const parts = str.split(',');
        if (parts.length === 2 && parts[1].length === 3 && !parts[0].includes('.')) {
            // ambiguous — treat as decimal to be safe
            str = str.replace(',', '.');
        } else {
            str = str.replace(',', '.');
        }
    }
    // Remove any remaining non-numeric chars except dot and minus
    str = str.replace(/[^\d.\-]/g, '');
    const num = parseFloat(str);
    return isNaN(num) ? 0 : num;
}

function ordenarDados(dados, coluna, direcao) {
    return [...dados].sort((a, b) => {
        let va = a[coluna] !== undefined && a[coluna] !== null ? a[coluna] : '';
        let vb = b[coluna] !== undefined && b[coluna] !== null ? b[coluna] : '';
        const camposMonetarios = ['valor_despesa_empenhada','valor_despesa_liquidada','valor_pago_financeiro','valor_pago_processado','valor_pago_nao_processado','valor_pago_rp'];
        if (camposMonetarios.includes(coluna)) {
            va = typeof va === 'number' ? va : parsearValorMonetario(va);
            vb = typeof vb === 'number' ? vb : parsearValorMonetario(vb);
        } else {
            va = String(va).toLowerCase();
            vb = String(vb).toLowerCase();
        }
        return direcao === 'asc' ? (va < vb ? -1 : va > vb ? 1 : 0) : (va > vb ? -1 : va < vb ? 1 : 0);
    });
}

async function carregarDados() {
    mostrarLoading(true, 'Carregando dados de empenho...');
    try {
        dadosEmpenho = [];
        dadosLicitacoes = [];
        const orgaoMap = new Map(); // codigo → nome

        // Carregar empenhos, licitações e orgãos por ano
        for (const ano of ANOS_DISPONIVEIS) {
            mostrarLoading(true, `Carregando empenhos ${ano}...`);
            try {
                const resp = await fetch(`${URL_EMPENHO_BASE}${ano}.csv`);
                if (resp.ok) {
                    const texto = await resp.text();
                    const dados = parseCSV(texto);
                    dadosEmpenho = [...dadosEmpenho, ...dados];
                }
            } catch(e) { console.error(`Erro empenho ${ano}:`, e); }

            // Carregar licitações para cruzar objeto_processo
            mostrarLoading(true, `Carregando licitações ${ano}...`);
            try {
                const resp2 = await fetch(`${URL_LICITACOES_BASE}${ano}.csv`);
                if (resp2.ok) {
                    const texto2 = await resp2.text();
                    const dados2 = parseCSV(texto2);
                    dadosLicitacoes = [...dadosLicitacoes, ...dados2];
                }
            } catch(e) { console.error(`Erro licitações ${ano}:`, e); }

            // Carregar orgão para enriquecer nomes
            mostrarLoading(true, `Carregando órgãos ${ano}...`);
            try {
                const resp3 = await fetch(`${URL_EMPENHO_BASE.replace('empenho','orgao')}${ano}.csv`);
                if (resp3.ok) {
                    const texto3 = await resp3.text();
                    const dados3 = parseCSV(texto3);
                    dados3.forEach(o => {
                        const cod = o['unidade_orcamentaria_codigo'] || o['codigo'] || '';
                        const nome = o['unidade_orcamentaria_nome'] || o['nome'] || '';
                        if (cod && nome) orgaoMap.set(String(cod).trim(), nome);
                    });
                }
            } catch(e) { console.error(`Erro orgão ${ano}:`, e); }
        }

        // Debug: log colunas disponíveis nas licitações
        if (dadosLicitacoes.length > 0) {
            console.log('[DEBUG] Colunas licitações:', Object.keys(dadosLicitacoes[0]));
            console.log('[DEBUG] Amostra licitação:', dadosLicitacoes[0]);
            console.log('[DEBUG] edital_retificacao_arquivos amostra:', dadosLicitacoes[0]['edital_retificacao_arquivos']);
            console.log('[DEBUG] numero_processo_formatado amostra:', dadosLicitacoes[0]['numero_processo_formatado']);
        }
        if (dadosEmpenho.length > 0) {
            console.log('[DEBUG] Colunas empenho:', Object.keys(dadosEmpenho[0]));
            console.log('[DEBUG] numero_processo_compra_siad amostra:', dadosEmpenho[0]['numero_processo_compra_siad']);
            console.log('[DEBUG] valor_despesa_empenhada amostra (raw):', dadosEmpenho[0]['valor_despesa_empenhada']);
        }


        // Mapa de licitações por numero_processo_formatado (chave exata E normalizada)
        const licitacoesMap = new Map();
        const licitacoesMapNorm = new Map(); // chave normalizada (só dígitos e letras, uppercase)
        function normalizarChave(s) { return String(s||'').toUpperCase().replace(/[\s\-\.\/]/g,''); }
        dadosLicitacoes.forEach(l => {
            if (l && l['numero_processo_formatado']) {
                const chave = String(l['numero_processo_formatado']).trim();
                licitacoesMap.set(chave, l);
                licitacoesMapNorm.set(normalizarChave(chave), l);
            }
        });
        console.log('[DEBUG] licitacoesMap size:', licitacoesMap.size);

        // Consolidar: enriquecer empenhos com dados das licitações
        dadosConsolidados = dadosEmpenho.map(emp => {
            const proc = emp['numero_processo_compra_siad'] ? String(emp['numero_processo_compra_siad']).trim() : null;
            // Busca exata primeiro, depois normalizada
            const lic = proc ? (licitacoesMap.get(proc) || licitacoesMapNorm.get(normalizarChave(proc)) || null) : null;
            // Enriquecer nome da unidade via orgaoMap se ausente
            const codUnid = emp['unidade_orcamentaria_codigo'] ? String(emp['unidade_orcamentaria_codigo']).trim() : '';
            const nomeUnid = emp['unidade_orcamentaria_nome'] || orgaoMap.get(codUnid) || '';

            return {
                ano_empenho: emp['ano_empenho'] ? formatarInteiro(emp['ano_empenho']) : '2026',
                unidade_orcamentaria_codigo: codUnid ? formatarInteiro(codUnid) : '',
                unidade_orcamentaria_nome: nomeUnid,
                numero_empenho: emp['numero_empenho'] ? formatarInteiro(emp['numero_empenho']) : '',
                data_registro_doc_empenho: emp['data_registro_doc_empenho'] || '',
                razao_social_credor: emp['razao_social_credor'] || 'Não informado',
                cnpj_cpf_credor_formatado: emp['cnpj_cpf_credor_formatado'] || '',
                licitacao_descricao_da_modalidade: emp['licitacao_descricao_da_modalidade'] || (lic ? lic['procedimento_contratacao_detalhamento_1'] : '') || '',
                numero_processo_compra_siad: proc || '',
                objeto_processo: lic ? (lic['objeto_processo'] || '') : '',
                elemento_despesa_codigo: emp['elemento_despesa_codigo'] ? formatarInteiro(emp['elemento_despesa_codigo']) : '',
                elemento_despesa_descricao: emp['elemento_despesa_descricao'] || '',
                valor_despesa_empenhada: parsearValorMonetario(emp['valor_despesa_empenhada']),
                valor_despesa_liquidada: parsearValorMonetario(emp['valor_despesa_liquidada']),
                valor_pago_financeiro: parsearValorMonetario(emp['valor_pago_financeiro']),
                valor_pago_processado: parsearValorMonetario(emp['valor_pago_processado']),
                valor_pago_nao_processado: parsearValorMonetario(emp['valor_pago_nao_processado']),
                valor_pago_rp: parsearValorMonetario(emp['valor_pago_rp']),
                // Campos extras das licitações
                _lic_ano_criacao_pedido: lic ? (lic['ano_criacao_pedido'] || '') : '',
                _lic_procedimento_grupo: lic ? (lic['procedimento_contratacao_grupo'] || '') : '',
                _lic_procedimento_det1: lic ? (lic['procedimento_contratacao_detalhamento_1'] || '') : '',
                _lic_procedimento_esp: lic ? (lic['procedimento_contratacao_especializacao'] || '') : '',
                _lic_codigo_orgao: lic ? (lic['codigo_orgao_entidade_compra'] || '') : '',
                _lic_nome_orgao: lic ? (lic['nome_orgao_entidade_compra'] || '') : '',
                _lic_data_criacao_pedido: lic ? (lic['data_criacao_pedido'] || '') : '',
                _lic_data_licitacao: lic ? (lic['data_licitacao'] || '') : '',
                _lic_numero_contrato: lic ? (lic['numero_contrato'] || '') : '',
                _lic_indicador_termo_contrato: lic ? (lic['indicador_termo_de_contrato'] || '') : '',
                _lic_situacao_processo: lic ? (lic['situacao_processo'] || '') : '',
                _lic_situacao_compra_item: lic ? (lic['situacao_compra_item_processo'] || '') : '',
                _lic_criterio_julgamento: lic ? (lic['criterio_julgamento'] || '') : '',
                _lic_nome_fornecedor: lic ? (lic['nome_empresarial_nome_fornecedor'] || '') : '',
                _lic_cnpj_fornecedor: lic ? (lic['cnpj_cpf_fornecedor_formatado'] || '') : '',
                _lic_numero_parecer: lic ? (lic['numero_parecer_juridico'] || '') : '',
                _lic_data_parecer: lic ? (lic['data_parecer_juridico'] || '') : '',
                _lic_edital_url: lic ? (lic['edital_retificacao_arquivos'] || '') : '',
                _lic_contrato_url: lic ? (lic['contrato_termoaditivo_arquivos'] || '') : '',
                _lic_link_processo: lic ? (lic['edital_retificacao_arquivos'] || '') : '',
                _lic_link_contrato: lic ? (lic['contrato_termoaditivo_arquivos'] || '') : '',
                _lic_valor_referencia: parsearValorMonetario(lic ? lic['valor_total_referencia_item_processo'] : null),

                _lic_valor_atualizado: parsearValorMonetario(lic ? lic['valor_total_atualizado'] : null),
            };
        });

        dadosFiltradosConsulta = [...dadosConsolidados];

        renderizarVisaoGeral();
        renderizarConsultaEmpenho();
        renderizarDownloads();

        // Data de atualização via GitHub API

    } catch(erro) {

        document.getElementById('visao-geral-content').innerHTML = '<div class="alert alert-danger m-3">Erro ao carregar dados. Verifique sua conexão e tente novamente.</div>';

    }
}

function getVGDadosFiltrados() {
    const ano = document.getElementById('vgFiltroAno')?.value;
    const unidade = (document.getElementById('vgFiltroUnidade')?.value || '').toLowerCase().trim();
    let dados = dadosConsolidados;
    if (ano) dados = dados.filter(d => d.ano_empenho == ano);
    if (unidade) dados = dados.filter(d => (d.unidade_orcamentaria_nome||'').toLowerCase().includes(unidade));
    return dados;
}

function agruparUnidades(dados) {
    const map = new Map();
    dados.forEach(d => {
        const key = d.unidade_orcamentaria_codigo + '|' + d.unidade_orcamentaria_nome;
        if (!map.has(key)) map.set(key, {
            unidade_orcamentaria_codigo: d.unidade_orcamentaria_codigo,
            unidade_orcamentaria_nome: d.unidade_orcamentaria_nome,
            valor_despesa_empenhada: 0, valor_despesa_liquidada: 0, valor_pago_financeiro: 0,
            valor_pago_processado: 0, valor_pago_nao_processado: 0, valor_pago_rp: 0
        });
        const r = map.get(key);
        r.valor_despesa_empenhada += d.valor_despesa_empenhada;
        r.valor_despesa_liquidada += d.valor_despesa_liquidada;
        r.valor_pago_financeiro += d.valor_pago_financeiro;
        r.valor_pago_processado += d.valor_pago_processado;
        r.valor_pago_nao_processado += d.valor_pago_nao_processado;
        r.valor_pago_rp += d.valor_pago_rp;
    });
    return Array.from(map.values());
}

function ordenarDadosGenerico(dados, coluna, direcao) {
    const camposMonetarios = ['valor_despesa_empenhada','valor_despesa_liquidada','valor_pago_financeiro','valor_pago_processado','valor_pago_nao_processado','valor_pago_rp'];
    return [...dados].sort((a, b) => {
        let va = a[coluna] !== undefined && a[coluna] !== null ? a[coluna] : '';
        let vb = b[coluna] !== undefined && b[coluna] !== null ? b[coluna] : '';
        if (camposMonetarios.includes(coluna)) {
            va = typeof va === 'number' ? va : parsearValorMonetario(va);
            vb = typeof vb === 'number' ? vb : parsearValorMonetario(vb);
        } else { va = String(va).toLowerCase(); vb = String(vb).toLowerCase(); }
        return direcao === 'asc' ? (va < vb ? -1 : va > vb ? 1 : 0) : (va > vb ? -1 : va < vb ? 1 : 0);
    });
}

function renderizarPaginacaoVG() {
    const container = document.getElementById('vgPaginacao');
    if (!container || window._vgUnidadesOrdenadas.length === 0) { if(container) container.innerHTML = ''; return; }
    const { atual, total, porPagina } = paginacaoVG;
    const inicio = (atual-1)*porPagina+1;
    const fim = Math.min(atual*porPagina, window._vgUnidadesOrdenadas.length);
    let html = `<div class="pagination-info"><span>Mostrando ${inicio.toLocaleString('pt-BR')}–${fim.toLocaleString('pt-BR')} de ${window._vgUnidadesOrdenadas.length.toLocaleString('pt-BR')}</span>
        <div class="page-size-selector"><span>Por pág:</span><select onchange="alterarPorPaginaVG(this.value)"><option value="25" ${porPagina==25?'selected':''}>25</option><option value="50" ${porPagina==50?'selected':''}>50</option><option value="100" ${porPagina==100?'selected':''}>100</option></select></div></div>`;
    html += `<div class="pagination-controls">
        <button onclick="mudarPaginaVG(1)" ${atual===1?'disabled':''}>«</button>
        <button onclick="mudarPaginaVG(${atual-1})" ${atual===1?'disabled':''}>‹</button>`;
    let ini=Math.max(1,atual-2), fim2=Math.min(total,ini+4);
    if(ini>1){html+=`<button onclick="mudarPaginaVG(1)">1</button>`; if(ini>2)html+=`<span style="padding:0 4px">…</span>`;}
    for(let i=ini;i<=fim2;i++) html+=`<button onclick="mudarPaginaVG(${i})" class="${i===atual?'active':''}">${i}</button>`;
    if(fim2<total){if(fim2<total-1)html+=`<span style="padding:0 4px">…</span>`;html+=`<button onclick="mudarPaginaVG(${total})">${total}</button>`;}
    html+=`<button onclick="mudarPaginaVG(${atual+1})" ${atual===total?'disabled':''}>›</button>
        <button onclick="mudarPaginaVG(${total})" ${atual===total?'disabled':''}>»</button></div>`;
    container.innerHTML = html;
}

window.mudarPaginaVG = function(p) {
    if (p<1||p>paginacaoVG.total) return;

window.alterarPorPaginaVG = function(v) {

function montarCabecalhoConsulta() {
    let html = '';

    for (const col of ordemColunasConsulta) {

        const camposMonetarios = [
            'valor_despesa_empenhada',
            'valor_despesa_liquidada',
            'valor_pago_financeiro',
            'valor_pago_processado',
            'valor_pago_nao_processado',
            'valor_pago_rp'
        ];

        const alinhDir = camposMonetarios.includes(col) ? ' text-right' : '';

        html += `<th class="sortable-header${alinhDir}" onclick="toggleSortConsulta('${col}')">
                    ${nomesColunas[col] || col}

    const ano = document.getElementById('consFiltroAno')?.value;

    const unidade = (document.getElementById('consFiltroUnidade')?.value||'').toLowerCase().trim();

    const descElem = (document.getElementById('consFiltroDescElemento')?.value||'').toLowerCase().trim();
    const objeto = (document.getElementById('consFiltroObjeto')?.value||'').toLowerCase().trim();

    dadosFiltradosConsulta = dadosConsolidados.filter(d => {

};

function renderizarPaginacaoConsulta() {
    const container = document.getElementById('consultaPaginacao');
    if (!container || dadosFiltradosConsulta.length === 0) { if(container) container.innerHTML = ''; return; }
    const { atual, total, porPagina } = paginacaoConsulta;
    const inicio = (atual-1)*porPagina+1;
    const fim = Math.min(atual*porPagina, dadosFiltradosConsulta.length);
    let html = `<div class="pagination-info"><span>Mostrando ${inicio.toLocaleString('pt-BR')}–${fim.toLocaleString('pt-BR')} de ${dadosFiltradosConsulta.length.toLocaleString('pt-BR')}</span>
        <div class="page-size-selector"><span>Por pág:</span><select onchange="alterarPorPaginaConsulta(this.value)">
        <option value="25" ${porPagina==25?'selected':''}>25</option>
        <option value="50" ${porPagina==50?'selected':''}>50</option>
        <option value="100" ${porPagina==100?'selected':''}>100</option></select></div></div>`;
    html += `<div class="pagination-controls">
        <button onclick="mudarPaginaConsulta(1)" ${atual===1?'disabled':''}>«</button>
        <button onclick="mudarPaginaConsulta(${atual-1})" ${atual===1?'disabled':''}>‹</button>`;
    let ini=Math.max(1,atual-2), fim2=Math.min(total,ini+4);
    if(ini>1){html+=`<button onclick="mudarPaginaConsulta(1)">1</button>`;if(ini>2)html+=`<span style="padding:0 4px">…</span>`;}
    for(let i=ini;i<=fim2;i++) html+=`<button onclick="mudarPaginaConsulta(${i})" class="${i===atual?'active':''}">${i}</button>`;
    if(fim2<total){if(fim2<total-1)html+=`<span style="padding:0 4px">…</span>`;html+=`<button onclick="mudarPaginaConsulta(${total})">${total}</button>`;}
    html+=`<button onclick="mudarPaginaConsulta(${atual+1})" ${atual===total?'disabled':''}>›</button>
        <button onclick="mudarPaginaConsulta(${total})" ${atual===total?'disabled':''}>»</button></div>`;
    html+=`<div class="page-input"><input type="number" id="irPagConsulta" min="1" max="${total}" value="${atual}" onkeypress="if(event.key==='Enter')irParaPaginaConsulta()"><button onclick="irParaPaginaConsulta()">Ir</button></div>`;
    container.innerHTML = html;
}

window.mudarPaginaConsulta = function(p) {
    if (p<1||p>paginacaoConsulta.total) return;
    paginacaoConsulta.atual = p; atualizarTabelaConsulta();
};
window.alterarPorPaginaConsulta = function(v) {
    paginacaoConsulta.porPagina = parseInt(v); paginacaoConsulta.atual = 1;
    paginacaoConsulta.total = Math.max(1, Math.ceil(dadosFiltradosConsulta.length/paginacaoConsulta.porPagina));
    atualizarTabelaConsulta();
};
window.irParaPaginaConsulta = function() {
    const input = document.getElementById('irPagConsulta');
    if (!input) return;
    let p = parseInt(input.value);
    if (isNaN(p)||p<1) p=1; if(p>paginacaoConsulta.total) p=paginacaoConsulta.total;
    mudarPaginaConsulta(p);
};

window.exportarTabelaVGCSV = function() {
    const headers = ['Código','Unidade Orçamentária','Valor Pago','Pago Processado','Pago Não Processado','Pago RP'];
    const rows = window._vgUnidadesOrdenadas.map(u => [u.unidade_orcamentaria_codigo,u.unidade_orcamentaria_nome,u.valor_pago_financeiro,u.valor_pago_processado,u.valor_pago_nao_processado,u.valor_pago_rp]);
    const csv = [headers.join(';'), ...rows.map(r=>r.map(c=>`"${c||''}"`).join(';'))].join('\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'visao_geral_empenhos.csv'; a.click();
};

window.exportarTabelaVGPDF = function() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape' });
    doc.setFontSize(12); doc.text('Visão Geral — Despesa por Empenho', 14, 12);
    doc.setFontSize(8); doc.text(`Emitido em: ${new Date().toLocaleString('pt-BR')}`, 14, 18);
    const body = (window._vgUnidadesOrdenadas||[]).slice(0,100).map(u=>[u.unidade_orcamentaria_codigo||'-',u.unidade_orcamentaria_nome||'-',formatarMoeda(u.valor_pago_financeiro),formatarMoeda(u.valor_pago_processado),formatarMoeda(u.valor_pago_rp)]);
    doc.autoTable({ head:[['Código','Unidade Orçamentária','Pago','Pago Processado','Pago RP']], body, startY:22, headStyles:{fillColor:[32,68,93]}, styles:{fontSize:7} });
    doc.save('visao_geral_empenhos.pdf');
};

window.exportarConsultaCSV = function() {
    const headers = ordemColunasConsulta.filter(c=>colunasFixasConsulta.includes(c)||colunasVisiveisConsulta[c]).map(c=>nomesColunas[c]||c);
    const rows = dadosFiltradosConsulta.map(item => ordemColunasConsulta.filter(c=>colunasFixasConsulta.includes(c)||colunasVisiveisConsulta[c]).map(c=>{
        let v = item[c];
        if (c==='data_registro_doc_empenho') v = formatarData(v);
        return v||'';
    }));
    const csv = [headers.join(';'), ...rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(';'))].join('\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'consulta_empenhos.csv'; a.click();
};

window.exportarConsultaPDF = function() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape' });
    doc.setFontSize(12); doc.text('Consulta por Empenho — Transparência MG', 14, 12);
    doc.setFontSize(8); doc.text(`Emitido em: ${new Date().toLocaleString('pt-BR')} | ${dadosFiltradosConsulta.length} registros`, 14, 18);
    const body = dadosFiltradosConsulta.slice(0,100).map(d=>[d.ano_empenho||'-',d.unidade_orcamentaria_nome||'-',d.numero_empenho||'-',formatarData(d.data_registro_doc_empenho),d.razao_social_credor||'-',d.elemento_despesa_codigo||'-',formatarMoeda(d.valor_pago_financeiro)]);
    doc.autoTable({ head:[['Ano','Unidade','Empenho','Data','Credor','Elemento','Pago']], body, startY:22, headStyles:{fillColor:[32,68,93]}, styles:{fontSize:6} });
    doc.save('consulta_empenhos.pdf');
};

window.exportarModalCSV = function() {
    const content = document.getElementById('modalContent');
    if (!content) return;
    const labels = content.querySelectorAll('.info-label');
    const values = content.querySelectorAll('.info-value');
    const rows = [['Campo','Valor']];
    labels.forEach((lbl,i) => { const v = values[i] ? values[i].textContent.trim() : '-'; rows.push([lbl.textContent.trim(), v]); });
    const csv = rows.map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(';')).join('\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'detalhes_empenho.csv'; a.click();
};

// 10. INICIALIZAÇÃO

document.addEventListener('click', e => {
    if (!e.target.closest('.column-selector')) {
        document.querySelectorAll('.column-selector-dropdown').forEach(d => d.classList.remove('show'));
    }
});

document.addEventListener('DOMContentLoaded', () => {
    carregarDados();
    document.querySelectorAll('[data-bs-toggle="tab"]').forEach(tab => {
        tab.addEventListener('shown.bs.tab', () => setTimeout(iframeUpdateHeight, 300));
    });
    window.addEventListener('resize', () => { clearTimeout(window.resizeTimer); window.resizeTimer = setTimeout(iframeUpdateHeight, 250); });
});

(function() {
    function sendHeight() {
        const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight) + 10;
        try { if(window.parent&&window.parent!==window) window.parent.postMessage({iframeHeight:h,iframeResize:true,type:'resize'},'*'); } catch(e) {}
    }
    if (window.ResizeObserver) new ResizeObserver(sendHeight).observe(document.body);
    else { window.addEventListener('resize', sendHeight); setInterval(sendHeight, 2000); }
    sendHeight();
})();
</script>
